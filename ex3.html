<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 3</title>
</head>
<body>
    <script>
        // 1. Capturar Entrada
let nomeCavaleiro = prompt("Qual é o seu nome de Cavaleiro?");

// 2. Avaliação Ternária (Verifica se o valor é Truthy ou Falsy)
// Se o usuário digitar algo, o valor é Truthy. Se deixar vazio ou cancelar, é Falsy.
let acesso = nomeCavaleiro ? "Permitido" : "Negado";

// 3. Exibir Resultado
alert("Acesso " + acesso);

    </script>
</body>
</html>
